apiVersion: apps/v1
kind: Deployment
metadata:
  name: app3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app3
  template:
    metadata:
      labels:
        app: app3
    spec:
      containers:
        - name: app3
          image: byjg/static-httpserver:latest
          env:
            - name: MESSAGE
              value: "Hello from App 3"
          ports:
            - containerPort: 8080

---

apiVersion: v1
kind: Service
metadata:
  name: app3
spec:
  type: ClusterIP
  selector:
    app: app3
  ports:
    - port: 80
      targetPort: 8080

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app3
spec:
  defaultBackend:
    service:
      name: app3
      port:
        number: 80